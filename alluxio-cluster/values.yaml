# =======================================================================
# Global image
# =======================================================================
global:
  azure:
    images:
      enterprise:
        tag: AI-3.7-13.0.29-marketplace
        image: alluxio-enterprise
        registry: alluxio.azurecr.io/alluxio
      grafana:
        tag: 11.1.13-ubuntu
        image: grafana 
        registry: alluxio.azurecr.io/alluxio

# ========================================================================
# Alluxio Cluster Configuration
# ========================================================================
cluster:
  name: rds
  image:
    pullPolicy: IfNotPresent
  
  properties:
    licenseString: "" # 保持你的原有值，此处省略过长字符

  etcd:
    replicaCount: 1
    persistence:
      enabled: false
      storageClass: managed-csi
      size: 50Gi

  # --- 经过重新设计的扁平化资源配置 ---
  coordinator:
    resources:
      cpuLimit: "8"
      cpuRequest: "2"
      memoryLimit: "16Gi"
      memoryRequest: "4Gi"
    jvm:
      xmx: "8g"
      xms: "4g"
      maxDirect: "8g"

  worker:
    count: 3
    pagestorePath: /mnt/alluxio/pagestore/data
    pagestoreSize: 10Gi
    resources:
      cpuLimit: "10"
      cpuRequest: "2"
      memoryLimit: "24Gi"
      memoryRequest: "4Gi"
    jvm:
      xmx: "16g"
      xms: "4g"
      maxDirect: "8g"
      
  fuse:
    resources:
      cpuLimit: "6"
      cpuRequest: "2"
      memoryLimit: "20Gi"
      memoryRequest: "4Gi"
    jvm:
      xmx: "12g"
      xms: "4g"
      maxDirect: "6g"
