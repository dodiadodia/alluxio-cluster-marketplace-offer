# =======================================================================
# Global image
# =======================================================================
global:
  azure:
    images:
      enterprise:
        tag: AI-3.7-13.0.29-rds
        image: alluxio-enterprise
        registry: alluxio.azurecr.cn/alluxio
      etcd:
        tag: 3.5.9-debian-11-r24
        image: etcd
        registry: alluxio.azurecr.cn/alluxio
      osshell:
        tag: 11-debian-11-r2
        image: os-shell
        registry: alluxio.azurecr.cn/alluxio
      prometheus:
        tag: v2.52.0
        image: prometheus
        registry: alluxio.azurecr.cn/alluxio
      grafana:
        tag: 11.1.0-ubuntu
        image: grafana 
        registry: alluxio.azurecr.cn/alluxio


# ========================================================================
# Alluxio Cluster Configuration (CR Instance)
# ========================================================================
cluster:
  name: rds
  # 部署到哪个 Namespace，默认跟随 Helm Release
  #namespace: alluxio

  image:
    pullPolicy: IfNotPresent

  # nodeSelector, alluxio.io/worker=enabled
  label: enabled

  # ----------------------------------------------------------------------
  # 关键业务配置 (Marketplace UI 绑定重点)
  # ----------------------------------------------------------------------
  properties:

  licenseString: ""

  # ----------------------------------------------------------------------
  # 规模与资源配置
  # ----------------------------------------------------------------------
  coordinator:
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "2"
        memory: "4Gi"
    jvmOptions:
      - -Xmx8g
      - -Xms4g
      - -XX:MaxDirectMemorySize=8g

  worker:
    pagestorePath: /mnt/alluxio/pagestore/data
    pagestoreSize: 10Gi
    count: 3
    resources:
      limits:
        cpu: "10"
        memory: "24Gi"
      requests:
        cpu: "2"
        memory: "4Gi"
    jvmOptions:
      - -Xmx16g
      - -Xms4g
      - -XX:MaxDirectMemorySize=8g
